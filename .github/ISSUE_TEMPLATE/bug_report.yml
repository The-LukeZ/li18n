name: Bug Report
description: Report a bug or unexpected behavior in li18n
labels: ["bug"]
assignees:
  - The-LukeZ
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and found no duplicate
          required: true
        - label: I tested with the latest version of li18n
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Create a config with ...
        2. Run `npx li18n build`
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: input
    id: runtime_version
    attributes:
      label: Bun / Node version
      placeholder: "e.g. Bun 1.2.0 / Node 20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: textarea
    id: config_snippet
    attributes:
      label: Relevant config / locale snippet
      description: Paste your `li18n.config.json` or locale JSON if relevant (remove any sensitive data).
      render: json

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information that might be helpful.
