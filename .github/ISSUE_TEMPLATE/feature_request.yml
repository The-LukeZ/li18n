name: Feature Request
description: Suggest a new feature or improvement for li18n
labels: ["enhancement"]
assignees:
  - The-LukeZ
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and discussions and found no duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this feature solve? Why do you need it?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like. Include any API or config changes you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about or tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, or any other context that helps explain the request.
